<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>艺数联动打卡系统 V5.0</title>
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .day-btn { transition: all 0.2s ease; }
        /* 隐藏滚动条 */
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-[#f5f7f5] font-sans min-h-screen text-gray-800 pb-10">

    <div class="max-w-md mx-auto bg-white min-h-screen shadow-lg sm:rounded-2xl sm:min-h-[800px] sm:mt-6 sm:overflow-hidden relative">
        
        <!-- 顶部导航条 -->
        <div class="bg-[#eaf5ec] p-4 flex justify-between items-center sticky top-0 z-20">
            <h1 class="text-xl font-bold text-gray-800">艺数联动打卡系统</h1>
            <div class="text-sm text-[#4caf50] font-semibold bg-[#dcfce7] px-3 py-1 rounded-full">当前：<span id="header-date"></span></div>
        </div>

        <div class="p-5 space-y-6">
            
            <!-- 模块 1：创建习惯 (保留原有所有功能) -->
            <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-5">
                <div class="mb-5 flex gap-2">
                    <input type="text" id="task-name" class="flex-1 bg-[#f8faf8] border border-gray-200 rounded-lg p-3 text-sm focus:outline-none focus:ring-2 focus:ring-[#4caf50]" placeholder="例如早起、背单词等">
                </div>
                <div class="mb-5">
                    <h3 class="text-sm font-bold text-gray-700 mb-3">习惯周期</h3>
                    <div class="flex gap-2 mb-3">
                        <span class="bg-[#eaf5ec] text-[#2e7d32] px-4 py-1.5 rounded-md text-sm font-bold cursor-pointer">按周</span>
                        <span class="text-gray-400 px-4 py-1.5 rounded-md text-sm cursor-pointer">固定/其他暂不演示</span>
                    </div>
                    <div class="flex justify-between mt-4" id="week-days-container"></div>
                </div>
                <div class="mb-5 flex justify-between items-center border-t border-gray-50 pt-4">
                    <h3 class="text-sm font-bold text-gray-700">打卡开始日期</h3>
                    <input type="date" id="start-date" class="text-sm text-gray-600 border-none outline-none bg-transparent text-right">
                </div>
                <button onclick="createTask()" class="w-full bg-[#4caf50] hover:bg-[#43a047] text-white font-bold py-3 px-4 rounded-full shadow-md transition-colors">
                    保存习惯，开始执行
                </button>
            </div>

            <!-- 模块 2：待办区 -->
            <div class="bg-[#fcfdfc] p-4 rounded-xl border border-gray-100 shadow-sm">
                <!-- 待办日期切换器 -->
                <div class="flex items-center justify-between mb-4">
                    <button onclick="changeDate(-1)" class="w-8 h-8 flex items-center justify-center rounded-full bg-white shadow-sm text-gray-500 hover:text-[#4caf50] hover:bg-green-50">◀</button>
                    <div class="text-center">
                        <h2 class="text-lg font-bold text-gray-800" id="view-date-title">今日待办</h2>
                        <span class="text-xs text-gray-400" id="view-date-subtitle"></span>
                    </div>
                    <button onclick="changeDate(1)" class="w-8 h-8 flex items-center justify-center rounded-full bg-white shadow-sm text-gray-500 hover:text-[#4caf50] hover:bg-green-50">▶</button>
                </div>
                
                <!-- 任务列表 -->
                <div id="today-tasks-list" class="space-y-3">
                    <!-- 动态渲染在此处 -->
                </div>
            </div>

            <!-- 模块 3：打卡记录墙 (V5.0 新增：按日期分区切换) -->
            <div class="bg-[#fcfdfc] p-4 rounded-xl border border-gray-100 shadow-sm">
                <!-- 记录墙日期切换器 -->
                <div class="flex items-center justify-between mb-4">
                    <button onclick="changeHistoryDate(-1)" class="w-8 h-8 flex items-center justify-center rounded-full bg-white shadow-sm text-gray-500 hover:text-[#4caf50] hover:bg-green-50">◀</button>
                    <div class="text-center">
                        <h2 class="text-lg font-bold text-gray-800" id="history-date-title">今日记录墙</h2>
                        <span class="text-xs text-gray-400" id="history-date-subtitle"></span>
                    </div>
                    <button onclick="changeHistoryDate(1)" class="w-8 h-8 flex items-center justify-center rounded-full bg-white shadow-sm text-gray-500 hover:text-[#4caf50] hover:bg-green-50">▶</button>
                </div>

                <div id="history-list" class="grid grid-cols-2 gap-3">
                    <!-- 历史记录展示 -->
                </div>
            </div>
        </div>
    </div>

    <!-- 打卡弹窗 -->
    <div id="checkin-modal" class="fixed inset-0 bg-black bg-opacity-40 hidden flex justify-center items-end sm:items-center z-50">
        <div class="bg-white p-6 rounded-t-2xl sm:rounded-2xl shadow-xl w-full sm:w-96 transform transition-transform">
            <h3 class="text-xl font-bold mb-4 text-center text-gray-800" id="modal-title">进行打卡</h3>
            <input type="hidden" id="current-task-id">
            
            <!-- 上传照片区域 -->
            <div class="mb-4 border-2 border-dashed border-[#a5d6a7] rounded-xl p-4 text-center bg-[#f1f8e9]">
                <label for="photo-upload" class="cursor-pointer block">
                    <div class="text-[#4caf50] mb-2 text-3xl">📷</div>
                    <p class="text-sm text-gray-600 font-medium">点击拍摄或上传照片</p>
                    <input type="file" id="photo-upload" accept="image/*" class="hidden" onchange="previewImage(event)"/>
                </label>
                <img id="image-preview" class="hidden mt-3 rounded-lg max-h-32 mx-auto object-cover" />
            </div>

            <!-- 文字输入区域 -->
            <div class="mb-6">
                <textarea id="checkin-note" rows="2" class="w-full bg-[#f8faf8] border border-gray-200 rounded-lg p-3 text-sm focus:outline-none focus:ring-2 focus:ring-[#4caf50]" placeholder="写点打卡心得吧（例如：已经完成作业啦！）"></textarea>
            </div>

            <div class="flex gap-3">
                <button onclick="closeModal()" class="flex-1 py-3 bg-gray-100 text-gray-600 rounded-full font-bold hover:bg-gray-200">取消</button>
                <button onclick="submitCheckIn()" class="flex-1 py-3 bg-[#4caf50] text-white rounded-full font-bold hover:bg-[#43a047]">确认打卡</button>
            </div>
        </div>
    </div>

    <script>
        // --- 核心数据结构 ---
        const DAYS_MAP =[
            { label: '一', value: 1 }, { label: '二', value: 2 }, 
            { label: '三', value: 3 }, { label: '四', value: 4 }, 
            { label: '五', value: 5 }, { label: '六', value: 6 }, 
            { label: '日', value: 0 }
        ];
        
        let selectedDays =[1, 2, 3, 4, 5, 6, 0]; 
        let tasks = JSON.parse(localStorage.getItem('habitTasks')) ||[];
        let records = JSON.parse(localStorage.getItem('habitRecords')) ||[];
        
        let viewDateObj = new Date();        // 待办列表的查看日期
        let historyDateObj = new Date();     // 记录墙的查看日期 【V5.0新增】

        function getStrFromDate(d) {
            return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
        }

        // --- 1. 初始化页面 UI ---
        function initUI() {
            document.getElementById('header-date').innerText = new Date().toLocaleDateString('zh-CN', {month: 'long', day: 'numeric'});
            document.getElementById('start-date').value = getStrFromDate(new Date());

            const container = document.getElementById('week-days-container');
            container.innerHTML = '';
            DAYS_MAP.forEach(day => {
                const isSelected = selectedDays.includes(day.value);
                const btn = document.createElement('div');
                btn.className = `day-btn w-9 h-9 flex items-center justify-center rounded-full text-sm font-bold cursor-pointer ${isSelected ? 'bg-[#a5d6a7] text-[#1b5e20]' : 'bg-gray-100 text-gray-400'}`;
                btn.innerText = day.label;
                btn.onclick = () => toggleDay(day.value, btn);
                container.appendChild(btn);
            });

            renderTasks();
            renderRecords();
        }

        // --- 2. 切换打卡周期 ---
        function toggleDay(dayValue, btnElement) {
            if (selectedDays.includes(dayValue)) {
                if (selectedDays.length === 1) return alert('至少需要选择一天打卡哦！');
                selectedDays = selectedDays.filter(d => d !== dayValue);
                btnElement.className = 'day-btn w-9 h-9 flex items-center justify-center rounded-full text-sm font-bold cursor-pointer bg-gray-100 text-gray-400';
            } else {
                selectedDays.push(dayValue);
                btnElement.className = 'day-btn w-9 h-9 flex items-center justify-center rounded-full text-sm font-bold cursor-pointer bg-[#a5d6a7] text-[#1b5e20]';
            }
        }

        // --- 3. 创建习惯 ---
        function createTask() {
            const name = document.getElementById('task-name').value.trim();
            const startDate = document.getElementById('start-date').value;

            if (!name) return alert('请输入习惯名称！');
            if (selectedDays.length === 0) return alert('请选择打卡周期！');

            const newTask = {
                id: 'task_' + Date.now(),
                name: name,
                cycleDays: [...selectedDays],
                startDate: startDate,
                createTime: new Date().getTime()
            };

            tasks.push(newTask);
            localStorage.setItem('habitTasks', JSON.stringify(tasks));
            
            document.getElementById('task-name').value = '';
            alert('习惯创建成功！');
            renderTasks();
        }

        // 待办日期切换逻辑
        function changeDate(offset) {
            viewDateObj.setDate(viewDateObj.getDate() + offset);
            renderTasks();
        }

        // 记录墙日期切换逻辑 【V5.0新增】
        function changeHistoryDate(offset) {
            historyDateObj.setDate(historyDateObj.getDate() + offset);
            renderRecords();
        }

        // --- 4. 渲染任务列表 ---
        function renderTasks() {
            const listDiv = document.getElementById('today-tasks-list');
            listDiv.innerHTML = '';

            const todayStr = getStrFromDate(new Date());
            const viewDateStr = getStrFromDate(viewDateObj);
            const viewDayOfWeek = viewDateObj.getDay();

            const titleEl = document.getElementById('view-date-title');
            const subTitleEl = document.getElementById('view-date-subtitle');
            subTitleEl.textContent = viewDateStr;
            
            const yesterdayDate = new Date();
            yesterdayDate.setDate(yesterdayDate.getDate() - 1);
            if (viewDateStr === todayStr) {
                titleEl.textContent = '今日待办';
            } else if (viewDateStr === getStrFromDate(yesterdayDate)) {
                titleEl.textContent = '昨日待办';
            } else {
                titleEl.textContent = `${viewDateObj.getMonth()+1}月${viewDateObj.getDate()}日 待办`;
            }

            const todaysTasks = tasks.filter(task => {
                const hasStarted = task.startDate <= viewDateStr;
                const isScheduledToday = task.cycleDays.includes(viewDayOfWeek);
                return hasStarted && isScheduledToday;
            });

            if (todaysTasks.length === 0) {
                listDiv.innerHTML = '<div class="text-center p-6 bg-gray-50 rounded-xl text-gray-400 text-sm border border-dashed border-gray-200">这一天没有任何打卡任务哦~</div>';
                return;
            }

            todaysTasks.forEach(task => {
                const hasCheckedIn = records.some(r => r.taskId === task.id && r.date === viewDateStr);

                let buttonHtml = '';
                const isFuture = viewDateStr > todayStr;
                const isPast = viewDateStr < todayStr;

                if (hasCheckedIn) {
                    buttonHtml = `<button disabled class="bg-gray-100 text-gray-400 px-4 py-2 rounded-full text-sm font-bold flex items-center gap-1"><span>✅</span> 已完成</button>`;
                } else {
                    if (isFuture) {
                        buttonHtml = `<button disabled class="bg-gray-100 text-gray-400 px-4 py-2 rounded-full text-sm font-bold">⏳ 未开始</button>`;
                    } else if (isPast) {
                        buttonHtml = `<button onclick="openModal('${task.id}', '${task.name}')" class="bg-orange-100 text-orange-600 px-4 py-2 rounded-full text-sm font-bold hover:bg-orange-200">⚠️ 补卡</button>`;
                    } else {
                        buttonHtml = `<button onclick="openModal('${task.id}', '${task.name}')" class="bg-[#eaf5ec] text-[#2e7d32] px-4 py-2 rounded-full text-sm font-bold hover:bg-[#c8e6c9] transition-colors shadow-sm">🎯 去打卡</button>`;
                    }
                }

                const div = document.createElement('div');
                div.className = 'relative overflow-hidden rounded-xl bg-red-500'; 
                div.innerHTML = `
                    <div class="absolute inset-y-0 right-0 w-24 flex items-center justify-end pr-4 text-white font-bold cursor-pointer" onclick="deleteTask('${task.id}')">
                        删除 🗑️
                    </div>
                    <div class="task-card relative bg-white p-4 flex justify-between items-center rounded-xl shadow-sm border border-gray-100 z-10 transition-transform duration-300">
                        <div class="flex items-center gap-3 pointer-events-none">
                            <div class="w-10 h-10 bg-[#f1f8e9] rounded-full flex items-center justify-center text-xl">🎯</div>
                            <div>
                                <p class="font-bold text-gray-800 text-base">${task.name}</p>
                                <p class="text-xs text-gray-400 mt-0.5">⬅️ 左滑可删除该习惯</p>
                            </div>
                        </div>
                        ${buttonHtml}
                    </div>
                `;
                listDiv.appendChild(div);
            });

            attachSwipeListeners();
        }

        // 左滑删除事件监听
        function attachSwipeListeners() {
            const cards = document.querySelectorAll('.task-card');
            cards.forEach(card => {
                let isDragging = false;
                let startX = 0;
                let currentX = 0;

                const startDrag = (e) => {
                    isDragging = true;
                    startX = e.type.includes('mouse') ? e.pageX : e.touches[0].clientX;
                    card.style.transition = 'none'; 
                };

                const moveDrag = (e) => {
                    if (!isDragging) return;
                    const x = e.type.includes('mouse') ? e.pageX : e.touches[0].clientX;
                    currentX = x - startX;
                    if (currentX < 0) {
                        const moveX = Math.max(currentX, -90); 
                        card.style.transform = `translateX(${moveX}px)`;
                    }
                };

                const endDrag = (e) => {
                    if (!isDragging) return;
                    isDragging = false;
                    card.style.transition = 'transform 0.3s ease'; 
                    if (currentX < -45) {
                        card.style.transform = `translateX(-80px)`;
                    } else {
                        card.style.transform = `translateX(0px)`;
                    }
                    currentX = 0;
                };

                card.addEventListener('touchstart', startDrag, {passive: true});
                card.addEventListener('touchmove', moveDrag, {passive: true});
                card.addEventListener('touchend', endDrag);

                card.addEventListener('mousedown', startDrag);
                card.addEventListener('mousemove', moveDrag);
                card.addEventListener('mouseup', endDrag);
                card.addEventListener('mouseleave', endDrag);
            });
        }

        // 删除习惯逻辑
        function deleteTask(taskId) {
            if(confirm('确定要删除这个习惯吗？删除后未来将不再出现。')) {
                tasks = tasks.filter(t => t.id !== taskId);
                localStorage.setItem('habitTasks', JSON.stringify(tasks));
                renderTasks();
            }
        }

        // --- 5. 弹窗与照片预览 ---
        function openModal(taskId, taskName) {
            document.getElementById('current-task-id').value = taskId;
            const isPast = getStrFromDate(viewDateObj) < getStrFromDate(new Date());
            document.getElementById('modal-title').textContent = isPast ? `补卡: ${taskName}` : `打卡: ${taskName}`;
            
            document.getElementById('photo-upload').value = ''; 
            document.getElementById('image-preview').classList.add('hidden');
            document.getElementById('image-preview').src = '';
            document.getElementById('checkin-note').value = ''; 

            document.getElementById('checkin-modal').classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('checkin-modal').classList.add('hidden');
        }

        function previewImage(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const img = document.getElementById('image-preview');
                    img.src = e.target.result;
                    img.classList.remove('hidden');
                }
                reader.readAsDataURL(file);
            }
        }

        // --- 6. 提交打卡 ---
        function submitCheckIn() {
            const taskId = document.getElementById('current-task-id').value;
            const fileInput = document.getElementById('photo-upload');
            const file = fileInput.files[0];
            const note = document.getElementById('checkin-note').value.trim();

            if (!file && !note) {
                return alert('请至少上传一张照片或写一句心得哦！');
            }

            const saveRecord = (imageBase64) => {
                const task = tasks.find(t => t.id === taskId);
                const checkInDateStr = getStrFromDate(viewDateObj);
                
                const newRecord = {
                    id: 'rec_' + Date.now(),
                    taskId: taskId,
                    taskName: task.name,
                    date: checkInDateStr,
                    time: new Date().toLocaleTimeString('zh-CN', { hour12: false }),
                    image: imageBase64, 
                    note: note          
                };

                records.unshift(newRecord); 
                
                try {
                    localStorage.setItem('habitRecords', JSON.stringify(records));
                    closeModal();
                    
                    // 打卡成功后，自动将历史记录墙的日期也切换到当前打卡日期，方便用户立刻看到刚打卡的内容
                    historyDateObj = new Date(viewDateObj);
                    
                    renderTasks(); 
                    renderRecords();
                } catch (error) {
                    alert('存储失败，可能是图片过大超出了浏览器限制！');
                    records.shift();
                }
            };

            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    saveRecord(e.target.result);
                };
                reader.readAsDataURL(file); 
            } else {
                saveRecord(null);
            }
        }

        // --- 7. 渲染打卡照片墙 (V5.0：按日期过滤显示) ---
        function renderRecords() {
            const historyListDiv = document.getElementById('history-list');
            historyListDiv.innerHTML = '';

            // 获取当前选择的查看记录日期
            const todayStr = getStrFromDate(new Date());
            const viewHistoryStr = getStrFromDate(historyDateObj);

            // 更新记录墙的标题UI
            const titleEl = document.getElementById('history-date-title');
            const subTitleEl = document.getElementById('history-date-subtitle');
            subTitleEl.textContent = viewHistoryStr;
            
            const yesterdayDate = new Date();
            yesterdayDate.setDate(yesterdayDate.getDate() - 1);
            if (viewHistoryStr === todayStr) {
                titleEl.textContent = '今日记录墙';
            } else if (viewHistoryStr === getStrFromDate(yesterdayDate)) {
                titleEl.textContent = '昨日记录墙';
            } else {
                titleEl.textContent = `${historyDateObj.getMonth()+1}月${historyDateObj.getDate()}日 记录`;
            }

            // 【核心逻辑】：只过滤出日期等于所选日期的打卡记录
            const dailyRecords = records.filter(r => r.date === viewHistoryStr);

            if (dailyRecords.length === 0) {
                historyListDiv.innerHTML = `<p class="text-gray-400 text-sm col-span-2 text-center py-6 bg-gray-50 rounded-xl border border-dashed border-gray-200">这一天还没有留下足迹哦~</p>`;
                return;
            }

            // 只渲染当前选中日期的记录
            dailyRecords.forEach(record => {
                const div = document.createElement('div');
                div.className = 'bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden flex flex-col';
                
                let imageHtml = '';
                if (record.image) {
                    imageHtml = `<img src="${record.image}" class="w-full h-32 object-cover">`;
                } else {
                    imageHtml = `<div class="w-full h-24 bg-[#eaf5ec] flex items-center justify-center text-3xl">📝</div>`;
                }

                let noteHtml = '';
                if (record.note) {
                    noteHtml = `<div class="px-3 py-2 text-xs text-gray-600 border-b border-gray-50 italic">"${record.note}"</div>`;
                }

                div.innerHTML = `
                    <div class="relative overflow-hidden bg-gray-200">
                        ${imageHtml}
                        <div class="absolute bottom-0 left-0 right-0 bg-gradient-to-t from-black/60 to-transparent p-2 text-white">
                            <p class="text-xs font-bold drop-shadow-md">${record.taskName}</p>
                        </div>
                    </div>
                    ${noteHtml}
                    <div class="p-2 flex justify-between items-center bg-[#fafafa] mt-auto">
                        <span class="text-[10px] text-gray-400">✅ ${record.date}</span>
                        <span class="text-[10px] text-gray-400">${record.time}</span>
                    </div>
                `;
                historyListDiv.appendChild(div);
            });
        }

        // --- 启动应用 ---
        window.onload = initUI;
    </script>
</body>
</html>
