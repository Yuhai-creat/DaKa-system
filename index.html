<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>艺联清单 V14.0</title>
    
    <!-- 强制浏览器最高优先级预加载 Logo -->
    <link rel="preload" href="./logo.png" as="image">

    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 localForage 库 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/localforage/1.10.0/localforage.min.js"></script>
    <style>
        .day-btn { transition: all 0.2s ease; }
        ::-webkit-scrollbar { display: none; }
        
        /* 闪屏元素的进场动画 */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-up { animation: fadeUp 0.8s ease-out forwards; }
        .delay-100 { animation-delay: 150ms; }
        .delay-200 { animation-delay: 300ms; }
        
        /* 日历输入框样式 */
        input[type="date"]::-webkit-calendar-picker-indicator {
            cursor: pointer;
            opacity: 0.6;
        }

        /* 详情页滑入动画 */
        @keyframes slideInRight {
            from { transform: translateX(100%); }
            to { transform: translateX(0); }
        }
        .slide-in { animation: slideInRight 0.3s forwards cubic-bezier(0.25, 0.8, 0.25, 1); }
        
        /* 环形进度条动画 */
        .progress-ring__circle {
            transition: stroke-dashoffset 0.8s ease-in-out;
            transform: rotate(-90deg);
            transform-origin: 50% 50%;
        }
    </style>
</head>
<body class="bg-[#f5f7f5] font-sans min-h-screen text-gray-800 pb-10">

    <!-- 品牌闪屏页面 -->
    <div id="splash-screen" class="fixed inset-0 bg-white z-[9999] flex flex-col items-center justify-center transition-opacity duration-700 ease-in-out">
        <img src="img/logo.jpg" alt="艺数清单 Logo" class="w-40 h-40 mb-8 object-contain animate-fade-up" onerror="this.style.display='none';">
        <h1 class="text-4xl font-bold text-[#00a651] mb-5 tracking-[0.2em] pl-2 animate-fade-up delay-100 opacity-0">艺联清单</h1>
        <h2 class="text-2xl font-medium text-[#00a651] tracking-[0.1em] animate-fade-up delay-200 opacity-0">您的时间管家</h2>
    </div>

    <!-- 手机外壳容器 -->
    <div class="max-w-md mx-auto bg-[#f5f7f5] min-h-screen shadow-lg sm:rounded-2xl sm:min-h-[800px] sm:mt-6 overflow-hidden relative">
        
        <!-- ================= 主视图 (Dashboard) ================= -->
        <div id="main-view" class="block">
            <!-- 顶部导航条 -->
            <div class="bg-[#eaf5ec] p-4 flex justify-between items-center sticky top-0 z-20 shadow-sm">
                <h1 class="text-xl font-bold text-gray-800">艺联清单</h1>
                <div class="flex items-center gap-3">
                    <div class="text-sm text-[#4caf50] font-semibold bg-[#dcfce7] px-3 py-1 rounded-full">当前：<span id="header-date"></span></div>
                    <button onclick="clearAllData()" class="text-xl text-gray-400 hover:text-red-500 transition-colors" title="清空所有数据">⚙️</button>
                </div>
            </div>

            <div class="p-5 space-y-6">
                <!-- 模块 1：创建习惯 -->
                <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-5">
                    <div class="mb-5 flex gap-2">
                        <input type="text" id="task-name" class="flex-1 bg-[#f8faf8] border border-gray-200 rounded-lg p-3 text-sm focus:outline-none focus:ring-2 focus:ring-[#4caf50]" placeholder="例如早起、背单词等">
                    </div>
                    <div class="mb-5">
                        <h3 class="text-sm font-bold text-gray-700 mb-3">习惯周期</h3>
                        <div class="flex gap-2 mb-3">
                            <span class="bg-[#eaf5ec] text-[#2e7d32] px-4 py-1.5 rounded-md text-sm font-bold cursor-pointer">按周</span>
                            <span class="text-gray-400 px-4 py-1.5 rounded-md text-sm cursor-pointer">固定/其他暂不演示</span>
                        </div>
                        <div class="flex justify-between mt-4" id="week-days-container"></div>
                    </div>
                    <div class="mb-5 flex justify-between items-center border-t border-gray-50 pt-4">
                        <h3 class="text-sm font-bold text-gray-700">打卡开始日期</h3>
                        <input type="date" id="start-date" class="text-sm text-gray-600 border-none outline-none bg-transparent text-right">
                    </div>
                    <button onclick="createTask()" class="w-full bg-[#4caf50] hover:bg-[#43a047] text-white font-bold py-3 px-4 rounded-full shadow-md transition-colors">
                        保存习惯，开始执行
                    </button>
                </div>

                <!-- 模块 2：待办区 -->
                <div class="bg-[#fcfdfc] p-4 rounded-xl border border-gray-100 shadow-sm">
                    <div class="flex items-center justify-between mb-4">
                        <h2 class="text-lg font-bold text-gray-800" id="view-date-title">今日待办</h2>
                        <input type="date" id="task-date-picker" onchange="syncDate(this.value)" class="bg-[#eaf5ec] text-[#2e7d32] px-3 py-1.5 rounded-full text-sm font-bold cursor-pointer hover:bg-[#c8e6c9] transition-colors shadow-sm border-none outline-none text-center">
                    </div>
                    <div id="today-tasks-list" class="space-y-3"></div>
                </div>

                <!-- 模块 3：打卡记录墙 -->
                <div class="bg-[#fcfdfc] p-4 rounded-xl border border-gray-100 shadow-sm">
                    <div class="flex items-center justify-between mb-4">
                        <h2 class="text-lg font-bold text-gray-800" id="history-date-title">今日记录墙</h2>
                        <input type="date" id="record-date-picker" onchange="syncDate(this.value)" class="bg-[#eaf5ec] text-[#2e7d32] px-3 py-1.5 rounded-full text-sm font-bold cursor-pointer hover:bg-[#c8e6c9] transition-colors shadow-sm border-none outline-none text-center">
                    </div>
                    <div id="history-list" class="grid grid-cols-2 gap-3"></div>
                </div>
            </div>
        </div>

        <!-- ================= 任务详情视图 (Detail View) ================= -->
        <div id="detail-view" class="hidden absolute inset-0 bg-[#f5f7f5] z-30 min-h-screen flex-col">
            <!-- 详情页头部 -->
            <div class="bg-white p-4 flex justify-between items-center sticky top-0 shadow-sm z-40">
                <button onclick="closeDetailView()" class="text-3xl text-gray-400 hover:text-gray-800 px-2 leading-none pb-1">‹</button>
                
                <!-- 【V14.0 核心更新】可点击修改的动态图标区 -->
                <div class="flex flex-col items-center">
                    <div id="detail-header-icon-wrapper" onclick="openIconPicker()" class="relative cursor-pointer active:scale-95 transition-transform mb-1">
                        <!-- 动态渲染图标 -->
                    </div>
                    <span class="font-bold text-gray-800 text-lg" id="detail-task-name">加载中...</span>
                </div>

                <button onclick="editDetailTaskName()" class="text-sm font-bold text-[#4caf50] px-3 py-1.5 bg-[#eaf5ec] rounded-full hover:bg-[#c8e6c9] transition-colors">修改名称</button>
            </div>

            <!-- 详情页内容滚动区 -->
            <div class="flex-1 overflow-y-auto p-5 space-y-5 pb-20">
                
                <!-- 1. 月度进度模块 -->
                <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-5">
                    <h2 class="text-base font-bold text-gray-800 mb-4 flex items-center gap-2">
                        <span class="text-[#4caf50]">🏷️</span> <span id="month-progress-title">月打卡进度</span>
                    </h2>
                    
                    <!-- 环形进度条 -->
                    <div class="flex justify-center mb-6">
                        <div class="relative w-32 h-32">
                            <svg class="w-full h-full" viewBox="0 0 100 100">
                                <circle cx="50" cy="50" r="40" fill="none" stroke="#eaf5ec" stroke-width="8"></circle>
                                <circle id="progress-circle" class="progress-ring__circle" cx="50" cy="50" r="40" fill="none" stroke="#4caf50" stroke-width="8" stroke-dasharray="251.2" stroke-dashoffset="251.2" stroke-linecap="round"></circle>
                            </svg>
                            <div class="absolute inset-0 flex items-center justify-center flex-col">
                                <span class="text-2xl font-bold text-[#4caf50]" id="detail-percent">0%</span>
                            </div>
                        </div>
                    </div>

                    <!-- 数据统计三栏 -->
                    <div class="grid grid-cols-3 gap-2 text-center divide-x divide-gray-100 border-t border-gray-50 pt-4">
                        <div>
                            <p class="text-2xl font-bold text-gray-700" id="detail-planned">0</p>
                            <p class="text-xs text-gray-400 mt-1">计划打卡</p>
                        </div>
                        <div>
                            <p class="text-2xl font-bold text-[#4caf50]" id="detail-actual">0</p>
                            <p class="text-xs text-gray-400 mt-1">实际打卡</p>
                        </div>
                        <div>
                            <p class="text-2xl font-bold text-red-400" id="detail-missed">0</p>
                            <p class="text-xs text-gray-400 mt-1">错过打卡</p>
                        </div>
                    </div>
                </div>

                <!-- 2. 打卡日志模块 -->
                <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-5">
                    <h2 class="text-base font-bold text-gray-800 mb-4 flex items-center gap-2">
                        <span class="text-[#4caf50]">🗂️</span> 打卡日志
                    </h2>
                    <div id="detail-records-list" class="space-y-3 max-h-64 overflow-y-auto pr-2">
                        <!-- 专属打卡记录渲染在这里 -->
                    </div>
                </div>

                <!-- 3. 总进度模块 -->
                <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-5">
                    <h2 class="text-base font-bold text-gray-800 mb-4 flex items-center gap-2">
                        <span class="text-[#4caf50]">📊</span> 打卡总进度
                    </h2>
                    <div class="space-y-4">
                        <div class="flex justify-between items-center text-sm">
                            <span class="text-gray-500">开始日期:</span>
                            <span class="font-bold text-gray-700" id="detail-start-date">--</span>
                        </div>
                        <div class="flex justify-between items-center text-sm">
                            <span class="text-gray-500">距今天数:</span>
                            <span class="font-bold text-gray-700"><span id="detail-days-since">0</span> 天</span>
                        </div>
                        <div class="flex justify-between items-center text-sm">
                            <span class="text-gray-500">实际打卡天数:</span>
                            <span class="font-bold text-[#4caf50]"><span id="detail-total-actual">0</span> 天</span>
                        </div>
                        <div class="flex justify-between items-center text-sm">
                            <span class="text-gray-500">最长连续天数:</span>
                            <span class="font-bold text-orange-500"><span id="detail-longest-streak">0</span> 天</span>
                        </div>
                    </div>
                </div>

                <!-- 4. 删除习惯操作区 -->
                <div class="pt-6 pb-4">
                    <button onclick="deleteCurrentTask()" class="w-full bg-[#fef2f2] hover:bg-[#fee2e2] text-red-500 font-bold py-3 px-4 rounded-xl border border-red-100 transition-colors flex items-center justify-center gap-2 shadow-sm">
                        <span class="text-lg">🗑️</span> 删除该习惯计划
                    </button>
                    <p class="text-center text-[11px] text-gray-400 mt-3">删除后将不在待办列表出现，但历史记录墙仍会保留痕迹</p>
                </div>
            </div>
        </div>
    </div>

    <!-- ================= 【V14.0 新增】图标选择弹窗 (Bottom Sheet) ================= -->
    <div id="icon-picker-modal" class="fixed inset-0 bg-black/40 hidden z-[120] flex-col justify-end transition-opacity duration-300 opacity-0">
        <!-- 点击遮罩层也可关闭 -->
        <div class="absolute inset-0" onclick="closeIconPicker()"></div>
        
        <div id="icon-picker-content" class="bg-white rounded-t-3xl p-6 pb-10 transform translate-y-full transition-transform duration-300 relative z-10">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-lg font-bold text-gray-800">定制专属图标</h3>
                <button onclick="closeIconPicker()" class="text-gray-400 hover:text-gray-700 text-3xl leading-none">&times;</button>
            </div>

            <!-- 自定义相册上传区 -->
            <div class="mb-6">
                <p class="text-sm font-bold text-gray-500 mb-3">使用图片</p>
                <label class="flex items-center justify-center w-full py-4 bg-[#f8faf8] border-2 border-dashed border-[#a5d6a7] rounded-xl cursor-pointer hover:bg-[#eaf5ec] transition-colors active:scale-[0.98]">
                    <div class="text-center">
                        <span class="text-[#4caf50] text-2xl block mb-1">🖼️</span>
                        <span class="text-[#4caf50] font-bold text-sm">上传照片 (自动智能裁切圆形)</span>
                    </div>
                    <input type="file" accept="image/*" class="hidden" onchange="handleCustomIconUpload(event)">
                </label>
            </div>

            <!-- 预设 Emoji 区 -->
            <div>
                <p class="text-sm font-bold text-gray-500 mb-3">精选符号</p>
                <!-- JS 会动态向这里注入图标 -->
                <div id="preset-icons-grid" class="grid grid-cols-5 gap-4 max-h-60 overflow-y-auto pb-2 px-1">
                </div>
            </div>
        </div>
    </div>

    <!-- 打卡弹窗 (公用) -->
    <div id="checkin-modal" class="fixed inset-0 bg-black bg-opacity-40 hidden flex justify-center items-end sm:items-center z-[100]">
        <div class="bg-white p-6 rounded-t-2xl sm:rounded-2xl shadow-xl w-full sm:w-96 transform transition-transform">
            <h3 class="text-xl font-bold mb-4 text-center text-gray-800" id="modal-title">进行打卡</h3>
            <input type="hidden" id="current-task-id">
            
            <div class="mb-4 border-2 border-dashed border-[#a5d6a7] rounded-xl p-4 text-center bg-[#f1f8e9]">
                <label for="photo-upload" class="cursor-pointer block">
                    <div class="text-[#4caf50] mb-2 text-3xl">📷</div>
                    <p class="text-sm text-gray-600 font-medium">点击拍摄或上传照片</p>
                    <input type="file" id="photo-upload" accept="image/*" class="hidden" onchange="previewImage(event)"/>
                </label>
                <img id="image-preview" class="hidden mt-3 rounded-lg max-h-32 mx-auto object-cover" />
            </div>

            <div class="mb-6">
                <textarea id="checkin-note" rows="2" class="w-full bg-[#f8faf8] border border-gray-200 rounded-lg p-3 text-sm focus:outline-none focus:ring-2 focus:ring-[#4caf50]" placeholder="写点打卡心得吧（例如：已经完成作业啦！）"></textarea>
            </div>

            <div class="flex gap-3">
                <button onclick="closeModal()" class="flex-1 py-3 bg-gray-100 text-gray-600 rounded-full font-bold hover:bg-gray-200">取消</button>
                <button id="submit-btn" onclick="submitCheckIn()" class="flex-1 py-3 bg-[#4caf50] text-white rounded-full font-bold hover:bg-[#43a047]">确认打卡</button>
            </div>
        </div>
    </div>

    <script>
        // --- 核心数据结构 ---
        const DAYS_MAP =[
            { label: '一', value: 1 }, { label: '二', value: 2 }, 
            { label: '三', value: 3 }, { label: '四', value: 4 }, 
            { label: '五', value: 5 }, { label: '六', value: 6 }, 
            { label: '日', value: 0 }
        ];
        
        let selectedDays =[1, 2, 3, 4, 5, 6, 0]; 
        let tasks =[];
        let records =[];
        
        let globalViewDate = new Date();        
        let currentDetailTaskId = null; 

        // 统一获取日期字符串工具
        function getStrFromDate(d) {
            return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
        }

        // ================= 【V14.0 核心】图标统一渲染器 =================
        // 智能判断是显示 Emoji 还是渲染相册里的 Base64 图片
        function renderIconHtml(iconData, sizeClasses = 'w-10 h-10', textClass = 'text-xl') {
            const icon = iconData || '🎯'; // 兼容历史数据，如果没有设置图标默认用靶子
            if (icon.startsWith('data:image')) {
                // 如果是图片，渲染为圆形图片
                return `<img src="${icon}" class="${sizeClasses} object-cover rounded-full shadow-sm border border-gray-100 shrink-0">`;
            } else {
                // 如果是 Emoji，渲染在绿色底座上
                return `<div class="${sizeClasses} bg-[#f1f8e9] rounded-full flex items-center justify-center ${textClass} shadow-sm border border-gray-50 shrink-0">${icon}</div>`;
            }
        }

        // --- 0. 异步数据库初始化 ---
        async function initData() {
            const minSplashTime = new Promise(resolve => setTimeout(resolve, 2500));
            const loadData = (async () => {
                let lfTasks = await localforage.getItem('habitTasks');
                let lfRecords = await localforage.getItem('habitRecords');
                let oldTasks = localStorage.getItem('habitTasks');
                let oldRecords = localStorage.getItem('habitRecords');

                if (!lfTasks && oldTasks) {
                    tasks = JSON.parse(oldTasks);
                    await localforage.setItem('habitTasks', tasks);
                    localStorage.removeItem('habitTasks'); 
                } else {
                    tasks = lfTasks ||[];
                }

                if (!lfRecords && oldRecords) {
                    records = JSON.parse(oldRecords);
                    await localforage.setItem('habitRecords', records);
                    localStorage.removeItem('habitRecords'); 
                } else {
                    records = lfRecords ||[];
                }
            })();

            try {
                await Promise.all([loadData, minSplashTime]);
                initUI();
                const splash = document.getElementById('splash-screen');
                splash.style.opacity = '0'; 
                setTimeout(() => { splash.style.display = 'none'; }, 700); 
            } catch (err) {
                console.error('数据库初始化失败:', err);
                alert('数据库加载失败，请刷新重试！');
            }
        }

        // --- 1. 初始化页面 UI ---
        function initUI() {
            document.getElementById('header-date').innerText = new Date().toLocaleDateString('zh-CN', {month: 'long', day: 'numeric'});
            document.getElementById('start-date').value = getStrFromDate(new Date());

            const container = document.getElementById('week-days-container');
            container.innerHTML = '';
            DAYS_MAP.forEach(day => {
                const isSelected = selectedDays.includes(day.value);
                const btn = document.createElement('div');
                btn.className = `day-btn w-9 h-9 flex items-center justify-center rounded-full text-sm font-bold cursor-pointer ${isSelected ? 'bg-[#a5d6a7] text-[#1b5e20]' : 'bg-gray-100 text-gray-400'}`;
                btn.innerText = day.label;
                btn.onclick = () => toggleDay(day.value, btn);
                container.appendChild(btn);
            });

            globalViewDate = new Date();
            renderTasks();
            renderRecords();
        }

        function syncDate(val) {
            if (!val) return;
            const[y, m, d] = val.split('-');
            globalViewDate = new Date(y, m - 1, d);
            renderTasks();
            renderRecords();
        }

        function toggleDay(dayValue, btnElement) {
            if (selectedDays.includes(dayValue)) {
                if (selectedDays.length === 1) return alert('至少需要选择一天打卡哦！');
                selectedDays = selectedDays.filter(d => d !== dayValue);
                btnElement.className = 'day-btn w-9 h-9 flex items-center justify-center rounded-full text-sm font-bold cursor-pointer bg-gray-100 text-gray-400';
            } else {
                selectedDays.push(dayValue);
                btnElement.className = 'day-btn w-9 h-9 flex items-center justify-center rounded-full text-sm font-bold cursor-pointer bg-[#a5d6a7] text-[#1b5e20]';
            }
        }

        function createTask() {
            const name = document.getElementById('task-name').value.trim();
            const startDate = document.getElementById('start-date').value;

            if (!name) return alert('请输入习惯名称！');
            if (selectedDays.length === 0) return alert('请选择打卡周期！');

            const newTask = {
                id: 'task_' + Date.now(),
                name: name,
                icon: '🎯', // 新建任务默认图标
                cycleDays:[...selectedDays],
                startDate: startDate,
                createTime: new Date().getTime()
            };

            tasks.push(newTask);
            localforage.setItem('habitTasks', tasks); 
            
            document.getElementById('task-name').value = '';
            alert('习惯创建成功！');
            renderTasks();
        }

        // ================= 详情页 & 图标更新逻辑 =================
        function updateDetailHeaderIcon(task) {
            const iconWrapper = document.getElementById('detail-header-icon-wrapper');
            // 调用渲染器，并加上右下角的“刷新/编辑”小红点
            iconWrapper.innerHTML = `
                ${renderIconHtml(task.icon, 'w-14 h-14', 'text-3xl')}
                <div class="absolute bottom-0 right-0 bg-white rounded-full p-1 shadow border border-gray-100 flex items-center justify-center">
                    <span class="text-[10px] block leading-none">🔄</span>
                </div>
            `;
        }

        function openTaskDetail(taskId) {
            currentDetailTaskId = taskId;
            const task = tasks.find(t => t.id === taskId);
            if(!task) return;

            document.getElementById('main-view').classList.replace('block', 'hidden');
            const detailView = document.getElementById('detail-view');
            detailView.classList.replace('hidden', 'flex');
            detailView.classList.add('slide-in');

            // 渲染详情页顶部标题和图标
            document.getElementById('detail-task-name').textContent = task.name;
            updateDetailHeaderIcon(task);

            // 进度计算...
            const now = new Date();
            const todayStr = getStrFromDate(now);
            const currentMonth = now.getMonth();
            const currentYear = now.getFullYear();
            document.getElementById('month-progress-title').textContent = `月打卡进度 - ${currentMonth + 1}月`;

            let plannedThisMonth = 0;
            let actualThisMonth = 0;
            let missedThisMonth = 0;

            const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
            for(let i=1; i<=daysInMonth; i++) {
                const d = new Date(currentYear, currentMonth, i);
                const dStr = getStrFromDate(d);
                const dayOfWeek = d.getDay();
                if (dStr >= task.startDate && task.cycleDays.includes(dayOfWeek)) {
                    plannedThisMonth++;
                    const hasRecord = records.some(r => r.taskId === task.id && r.date === dStr);
                    if (hasRecord) {
                        actualThisMonth++;
                    } else if (dStr < todayStr) {
                        missedThisMonth++; 
                    }
                }
            }

            document.getElementById('detail-planned').textContent = plannedThisMonth;
            document.getElementById('detail-actual').textContent = actualThisMonth;
            document.getElementById('detail-missed').textContent = missedThisMonth;

            const percent = plannedThisMonth === 0 ? 0 : Math.round((actualThisMonth / plannedThisMonth) * 100);
            document.getElementById('detail-percent').textContent = `${percent}%`;
            const circle = document.getElementById('progress-circle');
            const circumference = 251.2; 
            const offset = circumference - (percent / 100) * circumference;
            setTimeout(() => { circle.style.strokeDashoffset = offset; }, 100);

            // 渲染日志...
            const logContainer = document.getElementById('detail-records-list');
            logContainer.innerHTML = '';
            const taskRecords = records.filter(r => r.taskId === task.id);
            if (taskRecords.length === 0) {
                logContainer.innerHTML = `<div class="bg-gray-50 rounded-xl p-4 text-center text-gray-400 text-sm border border-dashed border-gray-200">📭 暂无打卡日志</div>`;
            } else {
                taskRecords.forEach(r => {
                    const rDiv = document.createElement('div');
                    rDiv.className = 'flex items-center justify-between p-3 bg-[#f8faf8] rounded-lg border border-gray-100';
                    let imgHtml = r.image ? `<img src="${r.image}" class="w-10 h-10 object-cover rounded-md border border-gray-200 shrink-0">` : `<div class="w-10 h-10 bg-[#eaf5ec] rounded-md flex items-center justify-center text-xl shrink-0">📝</div>`;
                    let noteHtml = r.note ? `<p class="text-xs text-gray-500 truncate w-32">${r.note}</p>` : '';
                    rDiv.innerHTML = `
                        <div class="flex items-center gap-3">
                            ${imgHtml}
                            <div>
                                <p class="font-bold text-sm text-gray-800">${r.date}</p>
                                ${noteHtml}
                            </div>
                        </div>
                        <span class="text-xs text-gray-400 bg-white px-2 py-1 rounded shadow-sm">${r.time}</span>
                    `;
                    logContainer.appendChild(rDiv);
                });
            }

            // 渲染总天数...
            const startD = new Date(task.startDate);
            const daysSince = Math.floor((now - startD) / (1000 * 60 * 60 * 24));
            
            let scheduledDates =[];
            let tempD = new Date(task.startDate);
            while(getStrFromDate(tempD) <= todayStr) {
                if(task.cycleDays.includes(tempD.getDay())) scheduledDates.push(getStrFromDate(tempD));
                tempD.setDate(tempD.getDate() + 1);
            }
            scheduledDates.reverse(); 

            let maxStreak = 0, currentStreak = 0;
            for(let dateStr of scheduledDates) {
                const hasRecord = records.some(r => r.taskId === task.id && r.date === dateStr);
                if(hasRecord) {
                    currentStreak++;
                    if(currentStreak > maxStreak) maxStreak = currentStreak;
                } else {
                    currentStreak = 0; 
                }
            }

            document.getElementById('detail-start-date').textContent = new Date(task.startDate).toLocaleDateString('zh-CN');
            document.getElementById('detail-days-since').textContent = daysSince >= 0 ? daysSince : 0;
            document.getElementById('detail-total-actual').textContent = taskRecords.length;
            document.getElementById('detail-longest-streak').textContent = maxStreak;
        }

        function closeDetailView() {
            const detailView = document.getElementById('detail-view');
            detailView.classList.remove('slide-in');
            detailView.classList.replace('flex', 'hidden');
            document.getElementById('main-view').classList.replace('hidden', 'block');
            currentDetailTaskId = null;
            document.getElementById('progress-circle').style.strokeDashoffset = 251.2;
        }

        function editDetailTaskName() {
            if(!currentDetailTaskId) return;
            const task = tasks.find(t => t.id === currentDetailTaskId);
            const newName = prompt('✏️ 请输入新的习惯名称：', task.name);
            if (newName !== null && newName.trim() !== '') {
                task.name = newName.trim();
                records.forEach(r => { if (r.taskId === task.id) r.taskName = task.name; });
                Promise.all([localforage.setItem('habitTasks', tasks), localforage.setItem('habitRecords', records)]).then(() => {
                    document.getElementById('detail-task-name').textContent = task.name;
                    renderTasks();
                    renderRecords();
                });
            }
        }

        // ================= 【V14.0 新增】图标选择器核心逻辑 =================
        function openIconPicker() {
            const modal = document.getElementById('icon-picker-modal');
            const content = document.getElementById('icon-picker-content');
            
            // 渲染 30 个精选的高频 Emoji 库
            const presetEmojis =['🎯','🏃','🏋️','🚴','🏊','🧘','📚','💻','📝','🧠','💧','🍎','🍳','🛌','💊','🎵','🎮','🎬','🎨','✈️','💰','🛍️','🧹','🐶','🪴','❤️','🌟','🔥','🚀','💡'];
            const grid = document.getElementById('preset-icons-grid');
            grid.innerHTML = presetEmojis.map(emoji => `
                <div onclick="updateTaskIcon('${emoji}')" class="aspect-square bg-[#f5f7f5] hover:bg-[#eaf5ec] rounded-2xl flex items-center justify-center text-3xl cursor-pointer transition-colors active:scale-90 border border-transparent hover:border-[#a5d6a7]">
                    ${emoji}
                </div>
            `).join('');

            modal.classList.remove('hidden');
            modal.classList.add('flex');
            
            // 延迟一帧触发 CSS 动画，实现平滑滑出
            requestAnimationFrame(() => {
                modal.classList.remove('opacity-0');
                content.classList.remove('translate-y-full');
            });
        }

        function closeIconPicker() {
            const modal = document.getElementById('icon-picker-modal');
            const content = document.getElementById('icon-picker-content');
            
            modal.classList.add('opacity-0');
            content.classList.add('translate-y-full');
            
            setTimeout(() => {
                modal.classList.add('hidden');
                modal.classList.remove('flex');
            }, 300); 
        }

        // 核心更新动作
        function updateTaskIcon(iconData) {
            if(!currentDetailTaskId) return;
            const task = tasks.find(t => t.id === currentDetailTaskId);
            if(task) {
                task.icon = iconData; // 保存 Emoji 或 Base64 图片
                localforage.setItem('habitTasks', tasks).then(() => {
                    closeIconPicker();
                    renderTasks(); // 刷新主页列表
                    updateDetailHeaderIcon(task); // 刷新详情页顶部
                });
            }
        }

        // 图片智能正方形/圆形裁剪算法
        function handleCustomIconUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    
                    // 设定头像的最佳清晰度尺寸
                    const size = 150; 
                    canvas.width = size;
                    canvas.height = size;

                    // 算法：短边优先，中心裁剪
                    const minDim = Math.min(img.width, img.height);
                    const startX = (img.width - minDim) / 2;
                    const startY = (img.height - minDim) / 2;

                    ctx.fillStyle = '#fff';
                    ctx.fillRect(0, 0, size, size);
                    ctx.drawImage(img, startX, startY, minDim, minDim, 0, 0, size, size);

                    // 压缩质量，保持极小的体积
                    const compressedBase64 = canvas.toDataURL('image/jpeg', 0.8);
                    updateTaskIcon(compressedBase64);
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
            
            // 清空 input 保证下次可重复选同一张图
            event.target.value = '';
        }
        // ======================================================

        function deleteCurrentTask() {
            if(!currentDetailTaskId) return;
            if(confirm('确定要彻底删除这个习惯计划吗？\n\n删除后该任务将从待办列表中消失，但你在照片墙的打卡痕迹仍会保留。')) {
                tasks = tasks.filter(t => t.id !== currentDetailTaskId);
                localforage.setItem('habitTasks', tasks).then(() => {
                    closeDetailView();
                    renderTasks();
                }).catch(err => {
                    console.error('删除失败:', err);
                    alert('删除失败，请重试！');
                });
            }
        }

        function renderTasks() {
            const listDiv = document.getElementById('today-tasks-list');
            listDiv.innerHTML = '';

            const todayStr = getStrFromDate(new Date());
            const viewDateStr = getStrFromDate(globalViewDate);
            const viewDayOfWeek = globalViewDate.getDay();

            document.getElementById('task-date-picker').value = viewDateStr;

            const titleEl = document.getElementById('view-date-title');
            const yesterdayDate = new Date();
            yesterdayDate.setDate(yesterdayDate.getDate() - 1);
            
            if (viewDateStr === todayStr) {
                titleEl.textContent = '今日待办';
            } else if (viewDateStr === getStrFromDate(yesterdayDate)) {
                titleEl.textContent = '昨日待办';
            } else {
                titleEl.textContent = `${globalViewDate.getMonth()+1}月${globalViewDate.getDate()}日 待办`;
            }

            const todaysTasks = tasks.filter(task => {
                const hasStarted = task.startDate <= viewDateStr;
                const isScheduledToday = task.cycleDays.includes(viewDayOfWeek);
                return hasStarted && isScheduledToday;
            });

            if (todaysTasks.length === 0) {
                listDiv.innerHTML = '<div class="text-center p-6 bg-gray-50 rounded-xl text-gray-400 text-sm border border-dashed border-gray-200">这一天没有任何打卡任务哦~</div>';
                return;
            }

            todaysTasks.forEach(task => {
                const hasCheckedIn = records.some(r => r.taskId === task.id && r.date === viewDateStr);

                let buttonHtml = '';
                const isFuture = viewDateStr > todayStr;
                const isPast = viewDateStr < todayStr;

                if (hasCheckedIn) {
                    buttonHtml = `<button disabled class="bg-gray-100 text-gray-400 px-4 py-2 rounded-full text-sm font-bold flex items-center gap-1"><span>✅</span> 已完成</button>`;
                } else {
                    if (isFuture) {
                        buttonHtml = `<button disabled class="bg-gray-100 text-gray-400 px-4 py-2 rounded-full text-sm font-bold">⏳ 未开始</button>`;
                    } else if (isPast) {
                        buttonHtml = `<button onclick="openModal('${task.id}', '${task.name}')" class="bg-orange-100 text-orange-600 px-4 py-2 rounded-full text-sm font-bold hover:bg-orange-200">⚠️ 补卡</button>`;
                    } else {
                        buttonHtml = `<button onclick="openModal('${task.id}', '${task.name}')" class="bg-[#eaf5ec] text-[#2e7d32] px-4 py-2 rounded-full text-sm font-bold hover:bg-[#c8e6c9] transition-colors shadow-sm">🎯 去打卡</button>`;
                    }
                }

                // 【V14.0 更新】渲染动态专属图标
                const dynamicIconHtml = renderIconHtml(task.icon, 'w-10 h-10', 'text-xl');

                const div = document.createElement('div');
                div.className = 'bg-white p-4 flex justify-between items-center rounded-xl shadow-sm border border-gray-100 transition-transform duration-300'; 
                div.innerHTML = `
                    <div class="flex items-center gap-3 select-none flex-1 cursor-pointer active:scale-[0.98] transition-transform" onclick="openTaskDetail('${task.id}')">
                        ${dynamicIconHtml}
                        <div>
                            <p class="font-bold text-gray-800 text-base">${task.name}</p>
                            <p class="text-[11px] text-gray-400 mt-0.5">点击查看打卡进度与详情</p>
                        </div>
                    </div>
                    ${buttonHtml}
                `;
                listDiv.appendChild(div);
            });
        }

        function clearAllData() {
            if(confirm('⚠️ 危险操作：作为产品经理测试，你确定要清空所有的习惯和打卡记录吗？清空后将无法恢复！')) {
                localforage.clear().then(() => {
                    localStorage.clear(); 
                    alert('数据已全部清空！即将刷新页面。');
                    location.reload();
                });
            }
        }

        function openModal(taskId, taskName) {
            document.getElementById('current-task-id').value = taskId;
            const isPast = getStrFromDate(globalViewDate) < getStrFromDate(new Date());
            document.getElementById('modal-title').textContent = isPast ? `补卡: ${taskName}` : `打卡: ${taskName}`;
            
            document.getElementById('photo-upload').value = ''; 
            document.getElementById('image-preview').classList.add('hidden');
            document.getElementById('image-preview').src = '';
            document.getElementById('checkin-note').value = ''; 
            
            const btn = document.getElementById('submit-btn');
            btn.textContent = '确认打卡';
            btn.disabled = false;
            btn.className = 'flex-1 py-3 bg-[#4caf50] text-white rounded-full font-bold hover:bg-[#43a047]';

            document.getElementById('checkin-modal').classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('checkin-modal').classList.add('hidden');
        }

        function previewImage(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const img = document.getElementById('image-preview');
                    img.src = e.target.result;
                    img.classList.remove('hidden');
                }
                reader.readAsDataURL(file);
            }
        }

        function compressImage(file, callback) {
            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    const MAX_WIDTH = 800, MAX_HEIGHT = 800;
                    let width = img.width, height = img.height;

                    if (width > height) {
                        if (width > MAX_WIDTH) { height *= MAX_WIDTH / width; width = MAX_WIDTH; }
                    } else {
                        if (height > MAX_HEIGHT) { width *= MAX_HEIGHT / height; height = MAX_HEIGHT; }
                    }

                    canvas.width = width; canvas.height = height;
                    ctx.fillStyle = '#fff'; ctx.fillRect(0, 0, canvas.width, canvas.height);
                    ctx.drawImage(img, 0, 0, width, height);

                    const compressedBase64 = canvas.toDataURL('image/jpeg', 0.6);
                    callback(compressedBase64);
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        function submitCheckIn() {
            const taskId = document.getElementById('current-task-id').value;
            const fileInput = document.getElementById('photo-upload');
            const file = fileInput.files[0];
            const note = document.getElementById('checkin-note').value.trim();

            if (!file && !note) return alert('请至少上传一张照片或写一句心得哦！');

            const btn = document.getElementById('submit-btn');
            btn.textContent = '保存中...'; btn.disabled = true;
            btn.className = 'flex-1 py-3 bg-gray-400 text-white rounded-full font-bold';

            const saveRecord = (imageBase64) => {
                const task = tasks.find(t => t.id === taskId);
                const newRecord = {
                    id: 'rec_' + Date.now(),
                    taskId: taskId,
                    taskName: task.name,
                    date: getStrFromDate(globalViewDate),
                    time: new Date().toLocaleTimeString('zh-CN', { hour12: false }),
                    image: imageBase64, 
                    note: note          
                };

                records.unshift(newRecord); 
                localforage.setItem('habitRecords', records).then(() => {
                    closeModal(); renderTasks(); renderRecords();
                }).catch((error) => {
                    alert('保存失败，请重试！');
                    records.shift(); 
                    btn.textContent = '确认打卡'; btn.disabled = false;
                    btn.className = 'flex-1 py-3 bg-[#4caf50] text-white rounded-full font-bold hover:bg-[#43a047]';
                });
            };

            if (file) compressImage(file, function(compressedResult) { saveRecord(compressedResult); });
            else saveRecord(null);
        }

        function renderRecords() {
            const historyListDiv = document.getElementById('history-list');
            historyListDiv.innerHTML = '';
            const todayStr = getStrFromDate(new Date());
            const viewHistoryStr = getStrFromDate(globalViewDate);

            document.getElementById('record-date-picker').value = viewHistoryStr;
            const titleEl = document.getElementById('history-date-title');
            const yesterdayDate = new Date(); yesterdayDate.setDate(yesterdayDate.getDate() - 1);
            
            if (viewHistoryStr === todayStr) titleEl.textContent = '今日记录墙';
            else if (viewHistoryStr === getStrFromDate(yesterdayDate)) titleEl.textContent = '昨日记录墙';
            else titleEl.textContent = `${globalViewDate.getMonth()+1}月${globalViewDate.getDate()}日 记录`;

            const dailyRecords = records.filter(r => r.date === viewHistoryStr);

            if (dailyRecords.length === 0) {
                historyListDiv.innerHTML = `<p class="text-gray-400 text-sm col-span-2 text-center py-6 bg-gray-50 rounded-xl border border-dashed border-gray-200">这一天还没有留下足迹哦~</p>`;
                return;
            }

            dailyRecords.forEach(record => {
                const div = document.createElement('div');
                div.className = 'bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden flex flex-col relative';
                
                let imageHtml = record.image ? `<img src="${record.image}" class="w-full h-32 object-cover">` : `<div class="w-full h-24 bg-[#eaf5ec] flex items-center justify-center text-3xl">📝</div>`;
                let noteHtml = record.note ? `<div class="px-3 py-2 text-xs text-gray-600 border-b border-gray-50 italic">"${record.note}"</div>` : '';

                div.innerHTML = `
                    <div class="relative overflow-hidden bg-gray-200">
                        ${imageHtml}
                        <div class="absolute bottom-0 left-0 right-0 bg-gradient-to-t from-black/60 to-transparent p-2 text-white pointer-events-none">
                            <p class="text-xs font-bold drop-shadow-md">${record.taskName}</p>
                        </div>
                    </div>
                    ${noteHtml}
                    <div class="p-2 flex justify-between items-center bg-[#fafafa] mt-auto">
                        <span class="text-[10px] text-gray-400">✅ ${record.date}</span>
                        <span class="text-[10px] text-gray-400">${record.time}</span>
                    </div>
                `;
                historyListDiv.appendChild(div);
            });
        }

        window.onload = initData;
    </script>
